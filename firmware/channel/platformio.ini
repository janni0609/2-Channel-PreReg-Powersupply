; PlatformIO project configuration for the power-supply CHANNEL MCU.
;
; Target: ATtiny1614 (tinyAVR 1-series) running at 3.3 V, internal 16 MHz osc.
; Core:   megaTinyCore (Arduino) by Spence Konde, provided through the
;         atmelmegaavr platform.
;
; Programming: UPDI. The default below assumes a SerialUPDI adapter (USB-UART
; with the recommended resistor on TX->UPDI). If you use a jtag2updi or a
; dedicated UPDI programmer, change upload_protocol accordingly.

[env:ATtiny1614]
platform        = atmelmegaavr
board           = ATtiny1614
framework       = arduino

; --- Clock ---
board_build.f_cpu   = 16000000L
board_hardware.oscillator = internal

; --- UPDI / upload ---
board_hardware.updi = updi
upload_protocol     = serialupdi
upload_speed        = 115200

; --- Serial monitor (matches the UART link to the Brain) ---
monitor_speed   = 1000000

; --- Build ---
build_flags =
    -Wall
    -Wextra
    -ffunction-sections
    -fdata-sections
    -I src
build_unflags =
    -std=gnu++11
build_src_flags =
    -std=gnu++17
